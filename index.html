<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Hand Tracker</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body {
        width: 100%;
        height: 100%;
        overflow: hidden;
        background: #000;
      }
      #scene-canvas {
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        height: 100%;
      }
      #status {
        position: fixed;
        top: 12px;
        left: 12px;
        font-family: monospace;
        font-size: 12px;
        color: #888;
        z-index: 10;
        pointer-events: none;
      }
      #hint {
        position: fixed;
        top: 30px;
        left: 12px;
        font-family: monospace;
        font-size: 12px;
        color: #888;
        z-index: 10;
        pointer-events: none;
      }
      #hand-canvas {
        position: fixed;
        bottom: 16px;
        right: 16px;
        width: 280px;
        height: 210px;
        z-index: 20;
        border-radius: 10px;
        border: 1px solid rgba(255, 255, 255, 0.15);
      }
    </style>
  </head>
  <body>
    <div id="status">no hand</div>
    <div id="hint">No need to touch your computer, just move your hand to play</div>
    <canvas id="scene-canvas"></canvas>
    <canvas id="hand-canvas" width="280" height="210"></canvas>
    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
